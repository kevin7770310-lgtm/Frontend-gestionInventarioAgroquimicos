<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoStock Pro | Gestión Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        .btn-outline-dark,
        .btn-outline-secondary {
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .btn-outline-dark:hover {
            background-color: var(--sidebar-color);
            color: white;
        }

        h2 {
            letter-spacing: -1px;
            color: #1e293b;
        }

        :root {
            --sidebar-color: #0d1a0d;
            --accent-color: #34d399;
            --bg-body: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            height: 100vh;
            padding: 2rem;
            z-index: 100;
        }

        .main-panel {
            margin-left: 260px;
            flex: 1;
            padding: 3rem;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .search-group {
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 500px;
        }

        .search-input {
            border: none;
            outline: none;
            flex: 1;
            padding-left: 10px;
            font-weight: 500;
        }

        .inventory-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table-custom thead th {
            background: #f8fafc;
            padding: 1rem;
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .prod-thumb {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
        }

        .stock-badge {
            background: #064e3b;
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 700;
        }

        .destacado-card {
            background: #fff;
            border-left: 4px solid #ef4444;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            min-width: 220px;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="brand">GEOSTOCK</div>
        <nav>
            <a href="#" class="nav-link text-white bg-dark p-3 rounded shadow-sm mb-2">Inventario</a>
            <a href="#" class="nav-link text-white-50 p-3" onclick="alert('Historial en construcción...')">Historial</a>
        </nav>
    </aside>

    <main class="main-panel">
        <h5 class="fw-bold mb-3 text-muted small">⚠️ PRODUCTOS CON STOCK CRÍTICO</h5>
        <div id="destacados" class="d-flex gap-3 mb-4 flex-wrap"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Control de Productos</h2>
            <button class="btn btn-dark fw-bold px-4 py-3" style="border-radius: 12px;" onclick="abrirModalNuevo()">+
                REGISTRAR</button>
        </div>

        <div class="search-group mb-4">
            <input type="text" id="q" class="search-input" placeholder="Escribe para buscar al instante..."
                oninput="buscar()">
        </div>

        <div class="d-flex gap-2 mb-4 overflow-auto pb-2">
            <button class="btn btn-sm btn-outline-secondary px-3" onclick="filtrarCat('')">Todos</button>
            <button class="btn btn-sm btn-outline-dark px-3"
                onclick="filtrarCat('Fertilizantes')">Fertilizantes</button>
            <button class="btn btn-sm btn-outline-dark px-3" onclick="filtrarCat('Insecticidas')">Insecticidas</button>
            <button class="btn btn-sm btn-outline-dark px-3" onclick="filtrarCat('Herbicidas')">Herbicidas</button>
        </div>

        <div class="inventory-card">
            <table class="table table-custom m-0">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th class="text-center">Stock</th>
                        <th class="text-center">Ajuste</th>
                        <th class="text-center">Acciones</th>
                        <th>Actualización</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <h4 class="fw-bold mb-4" id="modalTitulo">Nuevo Producto</h4>
                    <form id="formGlobal">
                        <input type="hidden" id="editID">
                        <input type="text" id="nombre" class="form-control mb-3 p-3 bg-light border-0"
                            placeholder="Nombre" required>
                        <select id="categoria" class="form-select mb-3 p-3 bg-light border-0"
                            title="Selecciona Categoría">
                            <option>Fertilizantes</option>
                            <option>Insecticidas</option>
                            <option>Herbicidas</option>
                        </select>
                        <input type="number" id="cantidad" class="form-control mb-3 p-3 bg-light border-0"
                            placeholder="Stock Inicial" required>

                        <div class="mb-3">
                            <div class="d-flex gap-2">
                                <input type="text" id="foto_url" class="form-control p-3 bg-light border-0"
                                    placeholder="URL Imagen">
                                <label class="btn btn-outline-dark d-flex align-items-center px-3"
                                    style="cursor:pointer; border-radius: 10px;">
                                    📷 <input type="file" id="file_input" hidden accept="image/*">
                                </label>
                            </div>
                            <div id="preview_container" class="mt-2 text-center" style="display:none;">
                                <img id="img_preview" src="" class="rounded shadow-sm"
                                    style="max-height: 120px; width: auto; border: 2px solid #34d399;">
                            </div>
                            <small id="upload_status" class="fw-bold mt-1 d-block" style="display:none;"></small>
                        </div>

                        <textarea id="descripcion" class="form-control mb-4 p-3 bg-light border-0"
                            placeholder="Descripción"></textarea>
                        <button type="submit" class="btn btn-dark w-100 p-3 fw-bold rounded-3"
                            id="btnGuardar">GUARDAR</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://back-gestioninventarioagroquimicos-production.up.railway.app/api/productos';
        const CLOUD_NAME = 'dh4yi7nxz';
        const UPLOAD_PRESET = 'geostock_fotos';
        let cacheProductos = [];

        async function cargarDatos() {
            try {
                const res = await fetch(`${API}/buscar?q=`);
                cacheProductos = await res.json();
                renderizarTabla(cacheProductos);
                actualizarDestacados(cacheProductos);
            } catch (err) { console.error("Error cargando inventario:", err); }
        }

        function renderizarTabla(data) {
            const tbody = document.getElementById('tbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center p-5 text-muted">No se encontraron productos.</td></tr>`;
                return;
            }
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${p.foto_url || 'https://via.placeholder.com/50'}" class="prod-thumb me-3" onerror="this.src='https://via.placeholder.com/50'">
                            <div><div class="fw-bold">${p.nombre}</div><small class="text-muted">${p.descripcion || ''}</small></div>
                        </div>
                    </td>
                    <td><span class="badge bg-light text-dark border">${p.categoria}</span></td>
                    <td class="text-center"><span class="stock-badge">${p.cantidad}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-success fw-bold" onclick="adj(${p.id}, 1)">+</button>
                        <button class="btn btn-sm btn-danger fw-bold" onclick="adj(${p.id}, -1)">-</button>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary me-1" onclick='prepararEdicion(${JSON.stringify(p).replace(/'/g, "&apos;")})'>✎</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminar(${p.id})">🗑</button>
                    </td>
                    <td class="small text-muted">${new Date(p.ultima_actualizacion).toLocaleString('es-EC')}</td>
                </tr>
            `).join('');
        }

        function buscar() {
            const q = document.getElementById('q').value.toLowerCase().trim();
            if (q === "") { renderizarTabla(cacheProductos); return; }
            const filtrados = cacheProductos.filter(p =>
                p.nombre.toLowerCase().includes(q) ||
                p.categoria.toLowerCase().includes(q) ||
                (p.descripcion && p.descripcion.toLowerCase().includes(q))
            );
            renderizarTabla(filtrados);
        }

        function actualizarDestacados(data) {
            const contenedorTitulo = document.querySelector('h5.text-muted');
            const div = document.getElementById('destacados');
            const bajos = data.filter(p => p.cantidad < 10).sort((a, b) => a.cantidad - b.cantidad).slice(0, 3);
            if (bajos.length === 0) {
                div.style.display = 'none';
                contenedorTitulo.style.display = 'none';
                return;
            }
            div.style.display = 'flex';
            contenedorTitulo.style.display = 'block';
            div.innerHTML = bajos.map(p => `
                <div class="destacado-card" style="border-left: 4px solid #ef4444; background: #fff5f5;">
                    <div class="small fw-bold text-danger">⚠️ RELLENAR PRONTO</div>
                    <div class="fw-bold text-dark">${p.nombre}</div>
                    <div class="h4 m-0 fw-bold">${p.cantidad} <span class="small text-muted" style="font-size: 0.7rem">uds</span></div>
                </div>
            `).join('');
        }

        function filtrarCat(cat) {
            document.getElementById('q').value = cat;
            buscar();
        }

        // SUBIDA CON VISTA PREVIA
        document.getElementById('file_input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // MOSTRAR PREVIEW LOCAL
            const previewContainer = document.getElementById('preview_container');
            const imgPreview = document.getElementById('img_preview');
            imgPreview.src = URL.createObjectURL(file);
            previewContainer.style.display = 'block';

            const status = document.getElementById('upload_status');
            status.style.display = 'block'; status.innerText = 'Subiendo... ⏳'; status.style.color = '#64748b';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    document.getElementById('foto_url').value = data.secure_url;
                    status.innerText = '¡Imagen lista! ✅'; status.style.color = '#10b981';
                }
            } catch (err) {
                status.innerText = 'Error al subir ❌'; status.style.color = '#ef4444';
            }
        });

        async function adj(id, cambio) {
            await fetch(`${API}/${id}/stock`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cambio })
            });
            cargarDatos();
        }

        async function eliminar(id) {
            if (confirm('¿Eliminar producto?')) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                cargarDatos();
            }
        }

        function abrirModalNuevo() {
            document.getElementById('formGlobal').reset();
            document.getElementById('editID').value = '';
            document.getElementById('upload_status').style.display = 'none';
            document.getElementById('preview_container').style.display = 'none';
            document.getElementById('modalTitulo').innerText = "Nuevo Producto";
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        function prepararEdicion(p) {
            document.getElementById('editID').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('categoria').value = p.categoria;
            document.getElementById('cantidad').value = p.cantidad;
            document.getElementById('foto_url').value = p.foto_url;
            document.getElementById('descripcion').value = p.descripcion;

            if (p.foto_url) {
                document.getElementById('img_preview').src = p.foto_url;
                document.getElementById('preview_container').style.display = 'block';
            } else {
                document.getElementById('preview_container').style.display = 'none';
            }

            document.getElementById('modalTitulo').innerText = "Editar Producto";
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        document.getElementById('formGlobal').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editID').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                cantidad: document.getElementById('cantidad').value,
                foto_url: document.getElementById('foto_url').value,
                descripcion: document.getElementById('descripcion').value
            };
            await fetch(id ? `${API}/${id}` : API, {
                method: id ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
            cargarDatos();
        };

        window.onload = cargarDatos;
    </script>
</body>

</html>
