<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoStock Pro | Gestión Integral</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        :root {
            --sidebar-color: #0d1a0d;
            --accent-color: #34d399;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            display: flex;
            min-height: 100vh;
            margin: 0;
        }

        /* Estructura */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            height: 100vh;
            padding: 2rem;
            z-index: 100;
        }

        .main-panel {
            margin-left: 260px;
            flex: 1;
            padding: 3rem;
        }

        .brand {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        /* Buscador y Botones */
        .search-group {
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 500px;
        }

        .search-input {
            border: none;
            outline: none;
            flex: 1;
            padding-left: 10px;
            font-weight: 500;
        }

        .btn-action-main {
            background: var(--accent-color);
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* Tabla */
        .inventory-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .table-custom thead th {
            background: #f8fafc;
            padding: 1rem;
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .table-custom tbody td {
            padding: 1rem;
            vertical-align: middle;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Multimedia y Badges */
        .prod-thumb {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
            background: #eee;
            border: 1px solid #ddd;
        }

        .stock-badge {
            background: #064e3b;
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: 700;
        }

        /* Botones de Gestión */
        .btn-edit {
            color: #2563eb;
            background: #dbeafe;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn-delete {
            color: #dc2626;
            background: #fee2e2;
            border: none;
            padding: 5px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .btn-edit:hover,
        .btn-delete:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <aside class="sidebar">
        <div class="brand">GEOSTOCK</div>
        <nav><a href="#" class="nav-link text-white bg-dark p-3 rounded shadow-sm">Inventario</a></nav>
    </aside>

    <main class="main-panel">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold m-0">Control de Productos</h2>
            <button class="btn btn-dark fw-bold px-4 py-3" style="border-radius: 12px;" onclick="abrirModalNuevo()">+
                REGISTRAR</button>
        </div>

        <div class="search-group mb-4">
            <input type="text" id="q" class="search-input" placeholder="Buscar por nombre..."
                onkeypress="if(event.key === 'Enter') buscar()">
            <button class="btn-action-main" onclick="buscar()">BUSCAR</button>
        </div>

        <div class="inventory-card">
            <table class="table table-custom m-0">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Categoría</th>
                        <th class="text-center">Stock</th>
                        <th class="text-center">Ajuste</th>
                        <th class="text-center">Gestión</th>
                        <th>Actualización</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>

    <div class="modal fade" id="modalProducto" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body p-4">
                    <h4 class="fw-bold mb-4" id="modalTitulo">Nuevo Producto</h4>
                    <form id="formGlobal">
                        <input type="hidden" id="editID">
                        <input type="text" id="nombre" class="form-control mb-3 p-3 bg-light border-0"
                            placeholder="Nombre" required>
                        <select id="categoria" title="Categoría del producto" aria-label="Seleccionar categoría"
                            class="form-select mb-3 p-3 bg-light border-0">
                            <option>Fertilizantes</option>
                            <option>Insecticidas</option>
                            <option>Herbicidas</option>
                        </select>
                        <input type="number" id="cantidad" class="form-control mb-3 p-3 bg-light border-0"
                            placeholder="Stock Inicial" required>
                        <input type="text" id="foto_url" class="form-control mb-3 p-3 bg-light border-0"
                            placeholder="URL Imagen">
                        <textarea id="descripcion" class="form-control mb-4 p-3 bg-light border-0"
                            placeholder="Descripción"></textarea>
                        <button type="submit" class="btn btn-dark w-100 p-3 fw-bold rounded-3"
                            id="btnGuardar">GUARDAR</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>

        const API = 'https://back-gestioninventarioagroquimicos-production.up.railway.app/api/productos';

        // BUSCAR
        async function buscar() {
            const q = document.getElementById('q').value;
            const res = await fetch(`${API}/buscar?q=${q}`);
            const data = await res.json();
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>
                        <div class="d-flex align-items-center">
                            <img src="${p.foto_url || 'https://via.placeholder.com/50'}" class="prod-thumb me-3" onerror="this.src='https://via.placeholder.com/50'">
                            <div><div class="fw-bold">${p.nombre}</div><small class="text-muted">${p.descripcion || ''}</small></div>
                        </div>
                    </td>
                    <td><span class="badge bg-light text-dark border">${p.categoria}</span></td>
                    <td class="text-center"><span class="stock-badge">${p.cantidad}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-success fw-bold" onclick="adj(${p.id},1)">+</button>
                        <button class="btn btn-sm btn-danger fw-bold" onclick="adj(${p.id},-1)">-</button>
                    </td>
                    <td class="text-center">
                        <button class="btn-edit" onclick="prepararEdicion(${JSON.stringify(p).replace(/"/g, '&quot;')})">✎</button>
                        <button class="btn-delete" onclick="eliminar(${p.id})">🗑</button>
                    </td>
                    <td class="small text-muted">${new Date(p.ultima_actualizacion).toLocaleString('es-EC')}</td>
                </tr>
            `).join('');
        }

        // AJUSTE RÁPIDO STOCK
        async function adj(id, cambio) {
            await fetch(`${API}/${id}/stock`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cambio }) });
            buscar();
        }

        // ELIMINAR
        async function eliminar(id) {
            if (confirm('¿Deseas borrar este producto de Neon?')) {
                await fetch(`${API}/${id}`, { method: 'DELETE' });
                buscar();
            }
        }

        // MODAL NUEVO / EDITAR
        function abrirModalNuevo() {
            document.getElementById('formGlobal').reset();
            document.getElementById('editID').value = '';
            document.getElementById('modalTitulo').innerText = "Nuevo Producto";
            document.getElementById('btnGuardar').innerText = "GUARDAR";
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        function prepararEdicion(p) {
            document.getElementById('editID').value = p.id;
            document.getElementById('nombre').value = p.nombre;
            document.getElementById('categoria').value = p.categoria;
            document.getElementById('cantidad').value = p.cantidad;
            document.getElementById('foto_url').value = p.foto_url;
            document.getElementById('descripcion').value = p.descripcion;

            document.getElementById('modalTitulo').innerText = "Editar Producto";
            document.getElementById('btnGuardar').innerText = "ACTUALIZAR";
            new bootstrap.Modal(document.getElementById('modalProducto')).show();
        }

        // GUARDAR (POST o PUT)
        document.getElementById('formGlobal').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editID').value;
            const data = {
                nombre: document.getElementById('nombre').value,
                categoria: document.getElementById('categoria').value,
                cantidad: document.getElementById('cantidad').value,
                foto_url: document.getElementById('foto_url').value,
                descripcion: document.getElementById('descripcion').value
            };

            const url = id ? `${API}/${id}` : API;
            const metodo = id ? 'PUT' : 'POST';

            await fetch(url, { method: metodo, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
            buscar();
        };

        window.onload = buscar;
    </script>
</body>

</html>
